# Release QA gate — mirrors the `salis-release-qa` Claude Code skill (.claude/skills/salis-release-qa).
# Blocking steps reflect what is green in the repo today (type-check, tests, build, migrations).
# lint / format / E2E run as non-blocking signal until the underlying TODOs below are resolved:
#   - lint:   `npm run lint` needs an ESLint v9 flat config (eslint.config.js); currently errors out.
#   - format: ~593 files are not Prettier-clean yet; run `npm run format` to fix, then make blocking.
#   - e2e:    Playwright suite not yet validated in CI; report is uploaded as an artifact.
name: Release QA

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  release-qa:
    name: Release QA gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: slis_gms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/slis_gms_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/slis_gms_test
      SESSION_SECRET: ci-test-secret-not-used-for-anything-real-just-needs-to-exist
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # --- Blocking: correctness gates (verified green) ---
      - name: Type check
        run: npm run check

      - name: Push Drizzle schema
        run: npx drizzle-kit push --force

      - name: Tests
        run: npm run test

      - name: Production build
        run: npm run build

      # --- Non-blocking signal (see TODOs at top of file) ---
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Format check (non-blocking)
        run: npx prettier --check "**/*.{ts,tsx,js,json,css}"
        continue-on-error: true

      - name: E2E (Playwright, non-blocking)
        run: |
          npx playwright install --with-deps chromium
          npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
