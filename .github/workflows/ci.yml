name: SalisAuto GMS CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # See .github/workflows/test.yml for why npm install (not ci).
        run: npm install --no-audit --no-fund

      - name: Type Check (TypeScript Compiler)
        run: npm run check

      - name: Run ESLint
        run: npm run lint || echo "Lint warnings present, proceeding"

      - name: Run Server Unit Tests
        run: npm run test:server
