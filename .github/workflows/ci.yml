name: SalisAuto GMS CI Pipeline

# Single authoritative pipeline. Consolidates the former duplicate workflows
# (ci.yml "Build, Lint & Test" + test.yml "Vitest (Postgres 16)") into one
# npm ci-based job: install -> typecheck -> lint -> build -> migrate -> test.

on:
  push:
    branches: [main, dev, pr-branch]
  pull_request:
    branches: [main, pr-branch]

jobs:
  ci:
    name: Typecheck, build & test (Postgres 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: slis_gms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/slis_gms_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/slis_gms_test
      SESSION_SECRET: ci-test-secret-not-used-for-anything-real-just-needs-to-exist
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      # Non-blocking until the ESLint config lands (tracked in #8).
      - name: Lint
        run: npm run lint || echo "Lint not yet configured/clean — proceeding"

      - name: Build
        run: npm run build

      - name: Push Drizzle schema
        run: npx drizzle-kit push --force

      - name: Test (Vitest)
        run: npm test
