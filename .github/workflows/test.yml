name: Tests

on:
  push:
    branches: [main, dev, pr-branch]
  pull_request:
    branches: [main, pr-branch]

jobs:
  test:
    name: Vitest (Postgres 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: slis_gms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/slis_gms_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/slis_gms_test
      SESSION_SECRET: ci-test-secret-not-used-for-anything-real-just-needs-to-exist
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm install (not ci) — the lock file is generated on Windows by the
      # developer machine and is missing the Linux-platform esbuild optional
      # deps that npm ci insists on. Using npm install lets CI resolve the
      # full Linux-side dep tree without forcing a wet-finger lock rewrite.
      - run: npm install --no-audit --no-fund

      - name: Push Drizzle schema
        run: npx drizzle-kit push --force

      - name: Run tests
        run: npm test
