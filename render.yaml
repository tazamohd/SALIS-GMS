services:
  - type: web
    name: slis-gms
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: slis-gms-db
          property: connectionString
databases:
  - name: slis-gms-db
    plan: free
